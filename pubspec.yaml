  flutter_flavorizr: ^2.4.2
  flutter_test:
    sdk: flutter
  patrol: ^4.5.0
  very_good_analysis: ^9.0.0

flutter:
  uses-material-design: true

patrol:
  app_name: Sayko
  test_directory: integration_test
  flavor: development
  android:
    package_name: com.example.sayko
  ios:
    bundle_id: com.example.sayko
  macos:
    bundle_id: com.example.macos.sayko

scripts: derry.yaml
