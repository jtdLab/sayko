  flutter: ^3.41.2

dependencies:
  bloc: ^9.0.0
  bloc_presentation: ^1.1.2
  cached_network_image: ^3.4.1
  clock: ^1.1.2
  collection: ^1.19.1
  crypto: ^3.0.7
  dio: ^5.9.1
  email_validator: ^3.0.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.3
  forui: ^0.20.2
  forui_hooks: ^0.20.0
  gap: ^3.0.1
  intl: ^0.20.2
  just_audio: ^0.10.5
  lockd:
    git:
      url: https://github.com/jtdLab/lockd
  logging: ^1.3.0
  meta: ^1.16.0
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sayko_assets:
    path: assets
  pretty_dio_logger: ^1.4.0
  provider: ^6.1.5+1
  rxdart: ^0.28.0
