name: sayko_assets
description: >
  Holds the assets for the Sayko App. The assets are included in a separate
  package, to be able to share them with widgetbook & app.
version: 0.0.0
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.2

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.3

dev_dependencies:
  build_runner: ^2.8.0
  flutter_gen_runner: ^5.12.0

flutter:
  assets:
    - fonts/
    - logos/

  fonts:
    - family: Social
      fonts:
        - asset: fonts/Social.ttf

flutter_gen:
  assets:
    outputs:
      package_parameter_enabled: true
  integrations:
    flutter_svg: true
  output: lib/src/generated